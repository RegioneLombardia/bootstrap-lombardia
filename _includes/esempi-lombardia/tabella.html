<div class="table-responsive p-2">
  <table class="table table-striped table-sm">
    <caption>Lista rihieste rimborso</caption>
    <thead class="table-primary">
      <tr>
        <th scope="col" class="text-center">
          <input id="checkbox_all" type="checkbox" aria-label="Scegli tutte le righe"> Tutto
        </th>
        <th scope="col" class="text-end">Numero/Anno</th>
        <th scope="col">Stato</th>
        <th scope="col">Data richiesta</th>

        <th scope="col">Data parere</th>
        <th scope="col" class="text-end">Importo</th>
        <th scope="col">Cod.regionale</th>
        <th scope="col">Cognome</th>
        <th scope="col">Nome</th>
        <th scope="col" class="text-center">Sesso</th>
        <th scope="col" class="text-center">Stato</th>
        <th scope="col" class="text-center">Azioni</th>
      </tr>
    </thead>
    <tbody>
      {% for i in (1..10) %}
        {% include html_docs/tabella/riga_tabella_full.html %}
      {% endfor %}
    </tbody>
  </table>
</div>
